
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="navbar">
        <div class="menu"></div>
        <div class="logo">
            <a href="./homepage.html">
                <img src="./assets/logo.png" alt="Image">
                <img src="./assets/smile.png" alt="Image">
            </a>
        </div>
        <div class="actions">
            <a href="/login.html"><img src="./assets/user.png" alt="Image"></a>
            <img src="./assets/cart.png" alt="Image">
            <img src="./assets/search.png" alt="Image">
        </div>
    </div>
    <div class="shipping-info">
        <p>SPEDIZIONE GRATIS PER GLI ORDINI SUPERIORI A 50 EURO</p>
    </div>
    <div class="section-title">
        <img src="./assets/smile-1.png" alt="Image">
    </div>
    <div class="section-content">
        <h3>CREA ACCOUNT</h3>
        <div class="old-customer">
            <h3>INFORMAZIONI PERSONALI</h3>
            <div class="content-old-customer">
                <p>Se hai un account con noi, accedi.</p>
                <div class="form">
                    <div class="name">
                        <h4>Nome di battesimo*</h4>
                        <input type="text" placeholder="name">
                    </div>
                    <div class="surname">
                        <h4>Cognome*</h4>
                        <input type="text" placeholder="surname">
                    </div>
                    <div class="email">
                        <h4>Indirizzo email*</h4>
                        <input type="text" placeholder="email@email.com">
                    </div>
                    <div class="password">
                        <h4>Parola d'ordine*</h4>
                        <input type="password" placeholder="********">
                    </div>
                    <div class="signup-button">CREA ACCOUNT</div>
                </div>
            </div>
        </div>
    </div>
    <div class="smile">
        <img src="./assets/smile-1.png" alt="Image">
    </div>
    <div class="footer">
        <div class="options">
            <p><a href="./info.html">Policy +</a></p>
            <p><a href="./info.html">Barrow Info +</a></p>
        </div>
        <div class="languages">
            <img src="./assets/it.png" alt="Image">
            <img src="./assets/uk.png" alt="Image">
        </div>
        <div class="payments">
            <img src="./assets/cards.png" alt="Image">
        </div>
    </div>
</body>
</html>
